<div class="pub-entry" style="
display: flex;
gap: 1em;
margin-bottom: 1.2em;
align-items: flex-start;
padding: 1em;
border: 1px solid #ddd;
border-radius: 8px;
background: #ffffff;
transition: box-shadow 0.2s ease, transform 0.2s ease;
cursor: pointer;
"
onclick="window.open('{{ include.link | default: "#" }}', '_blank')"
onmouseover="this.style.boxShadow='0 8px 28px rgba(0,0,0,0.22)'; this.style.transform='translateY(-2px)';"
onmouseout="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.10)'; this.style.transform='translateY(0)';">

{% if include.image %}
<div style="flex: 0 0 15%; aspect-ratio: 1 / 1;
display: flex; align-items: center; justify-content: center;
background: #f9f9f9;">
<img src="{{ include.image | relative_url }}" alt="{{ include.title }}"
style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;">
</div>
{% endif %}

<div style="flex: 1;">
<div style="margin-bottom: 0.2em; font-size: 0.85em; color: #767676;">{{ include.date }}</div>
<div style="margin-bottom: 0.2em;">
<strong style="color: #337AB7;">{{ include.title }}</strong>
</div>
{% if include.excerpt %}
<div style="color: #333333;">{{ include.excerpt }}</div>
{% endif %}
</div>
</div>
