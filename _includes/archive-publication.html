{% assign pub_url = post.paperurl | default: post.url %}
<a href="{{ pub_url }}" target="_blank" style="text-decoration: none; color: inherit; display: block;">
  <div class="pub-entry" style="
    display: flex;
    gap: 1em;
    margin-bottom: 1.2em;
    align-items: flex-start;
    padding: 1em;
    border: 1px solid #ddd;
    border-radius: 8px;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
    cursor: pointer;
  "
  onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.12)'; this.style.transform='translateY(-2px)';"
  onmouseout="this.style.boxShadow='none'; this.style.transform='translateY(0)';">

    {% if post.image %}
      <div style="flex: 0 0 15%; aspect-ratio: 1 / 1;
                  display: flex; align-items: center; justify-content: center;
                  background: #f9f9f9;">
        <img src="{{ post.image | relative_url }}" alt="{{ post.title }}"
             style="width: 100%; height: 100%; object-fit: cover;
                    border-radius: 4px; border: 1px solid #ccc;">
      </div>
    {% endif %}

    <div style="flex: 1;">
      <div style="margin-bottom: 0.2em;">
        <strong style="color: #337AB7;">{{ post.title }}</strong>
      </div>
      {% if post.authors %}
        <div style="margin-bottom: 0.2em;">{{ post.authors }}</div>
      {% endif %}
      <div style="margin-bottom: 0.5em;"><em>{{ post.venue }}</em>, {{ post.date | date: "%B %Y" }}</div>
      {% if post.excerpt %}
        <div>{{ post.excerpt }}</div>
      {% endif %}
    </div>

  </div>
</a>
